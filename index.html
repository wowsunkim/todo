<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f0f6;
      --surface: #ffffff;
      --border: #e2e2e8;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --text-muted: #aaa;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --danger: #ef4444;
      --ph: #ef4444;
      --pm: #f59e0b;
      --pl: #22c55e;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0e0e14;
        --surface: #1a1a24;
        --border: #2a2a38;
        --text-primary: #ededf0;
        --text-secondary: #999;
        --text-muted: #555;
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --danger: #f87171;
        --ph: #f87171;
        --pm: #fbbf24;
        --pl: #4ade80;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px;
      color: var(--text-primary);
    }

    .app { width: 100%; max-width: 520px; }

    /* ── Header ── */
    .header { margin-bottom: 28px; }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .date-label { font-size: 0.8rem; color: var(--text-muted); }

    .progress-wrap {
      background: var(--border);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #a5b4fc);
      border-radius: 999px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Input ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    button.add-btn {
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button.add-btn:hover { background: var(--accent-hover); }

    /* ── Priority selector ── */
    .priority-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
    }

    .priority-label { font-size: 0.78rem; color: var(--text-muted); margin-right: 2px; }

    .p-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      font-size: 0.78rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .p-btn[data-p="high"] .dot { background: var(--ph); }
    .p-btn[data-p="mid"]  .dot { background: var(--pm); }
    .p-btn[data-p="low"]  .dot { background: var(--pl); }

    .p-btn.active[data-p="high"] { border-color: var(--ph); color: var(--ph); background: rgba(239,68,68,0.08); }
    .p-btn.active[data-p="mid"]  { border-color: var(--pm); color: var(--pm); background: rgba(245,158,11,0.08); }
    .p-btn.active[data-p="low"]  { border-color: var(--pl); color: var(--pl); background: rgba(34,197,94,0.08); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Todo list ── */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      list-style: none;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0);   max-height: 80px; margin-bottom: 0; }
      to   { opacity: 0; transform: translateX(28px); max-height: 0;   margin-bottom: -8px; }
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: 10px;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-left: 4px solid transparent;
      transition: box-shadow 0.15s;
      animation: slideIn 0.2s ease;
    }

    .todo-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }

    .todo-item.p-high { border-left-color: var(--ph); }
    .todo-item.p-mid  { border-left-color: var(--pm); }
    .todo-item.p-low  { border-left-color: var(--pl); }

    .todo-item.removing {
      animation: slideOut 0.22s ease forwards;
      pointer-events: none;
      overflow: hidden;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: var(--text-primary);
      word-break: break-word;
      outline: none;
      border: none;
      background: transparent;
      cursor: text;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--danger); }

    .empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 40px 0;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: var(--danger); }

    /* ── AI Features ── */
    .ai-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .ai-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border: 1.5px solid var(--accent);
      background: transparent;
      border-radius: 999px;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--accent);
      transition: all 0.15s;
      font-weight: 500;
    }

    .ai-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
    }

    .ai-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .ai-btn.loading::after {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 4px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .ai-panel {
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
      font-size: 0.88rem;
      display: none;
    }

    .ai-panel.open { display: block; }

    .ai-panel-title {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 10px;
      font-size: 0.85rem;
    }

    .ai-suggestion-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .ai-suggestion-item:last-child { border-bottom: none; }

    .ai-suggestion-text { flex: 1; color: var(--text-primary); }

    .ai-suggestion-reason { font-size: 0.78rem; color: var(--text-muted); }

    .apply-btn {
      padding: 3px 10px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 999px;
      font-size: 0.76rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
    }

    .apply-btn:hover { background: var(--accent); color: #fff; }

    .apply-all-btn {
      margin-top: 10px;
      padding: 6px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }

    .apply-all-btn:hover { background: var(--accent-hover); }

    .ai-summary {
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(99,102,241,0.08);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .subtask-list { list-style: none; }

    .subtask-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
    }

    .subtask-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="app">

    <div class="header">
      <div class="header-top">
        <h1>할 일 목록</h1>
        <span class="date-label" id="date-label"></span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="progress-meta">
        <span id="progress-text">완료 0%</span>
        <span id="count-label"></span>
      </div>
    </div>

    <div class="input-row">
      <input type="text" id="new-todo" placeholder="새 할 일을 입력하세요... (자연어 입력 가능)" />
      <button class="add-btn" id="add-btn" onclick="addTodo()">추가</button>
    </div>

    <div class="priority-row">
      <span class="priority-label">우선순위</span>
      <button class="p-btn active" data-p="high" onclick="setPriority('high')"><span class="dot"></span>높음</button>
      <button class="p-btn"        data-p="mid"  onclick="setPriority('mid')"><span class="dot"></span>중간</button>
      <button class="p-btn"        data-p="low"  onclick="setPriority('low')"><span class="dot"></span>낮음</button>
    </div>

    <div class="ai-toolbar">
      <button class="ai-btn" id="btn-parse" onclick="aiParse()" title="자연어로 입력한 텍스트를 AI가 분석해 우선순위를 자동 설정합니다">✨ AI 파싱</button>
      <button class="ai-btn" id="btn-decompose" onclick="aiDecompose()" title="선택한 할 일을 세부 작업으로 분해합니다">🔀 작업 분해</button>
      <button class="ai-btn" id="btn-suggest" onclick="aiSuggest()" title="전체 할 일 목록을 분석해 우선순위 재조정을 제안합니다">💡 우선순위 제안</button>
    </div>

    <div class="ai-panel" id="ai-panel-decompose">
      <div class="ai-panel-title">🔀 작업 분해 결과</div>
      <ul class="subtask-list" id="subtask-list"></ul>
      <button class="apply-all-btn" onclick="applyAllSubtasks()">모두 추가</button>
    </div>

    <div class="ai-panel" id="ai-panel-suggest">
      <div class="ai-panel-title">💡 AI 우선순위 제안</div>
      <div id="suggest-list"></div>
      <button class="apply-all-btn" onclick="applyAllSuggestions()">모두 적용</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all"    onclick="setFilter('all')">전체</button>
      <button class="filter-btn"        data-filter="active" onclick="setFilter('active')">미완료</button>
      <button class="filter-btn"        data-filter="done"   onclick="setFilter('done')">완료</button>
      <button class="filter-btn"        data-filter="high"   onclick="setFilter('high')">🔴 높음만</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <div class="footer">
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>

  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';
    let selectedPriority = 'high';
    let nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;

    document.getElementById('date-label').textContent =
      new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

    function save() { localStorage.setItem('todos', JSON.stringify(todos)); }

    function render() {
      const list = document.getElementById('todo-list');
      const visible = todos.filter(t => {
        if (filter === 'done')   return t.done;
        if (filter === 'active') return !t.done;
        if (filter === 'high')   return t.priority === 'high';
        return true;
      });

      list.innerHTML = '';

      if (!visible.length) {
        list.innerHTML = '<li class="empty">할 일이 없습니다.</li>';
      } else {
        visible.forEach(t => {
          const li = document.createElement('li');
          li.className = `todo-item p-${t.priority || 'low'}${t.done ? ' done' : ''}`;
          li.dataset.id = t.id;
          li.innerHTML = `
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span class="todo-text" contenteditable="true"
              onblur="editText(${t.id}, this.textContent)"
              onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
            >${t.text}</span>
            <button class="delete-btn" onclick="remove(${t.id})" title="삭제">✕</button>
          `;
          list.appendChild(li);
        });
      }

      const total = todos.length;
      const done  = todos.filter(t => t.done).length;
      const pct   = total ? Math.round((done / total) * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `완료 ${pct}%`;
      document.getElementById('count-label').textContent =
        `미완료 ${total - done}개 / 전체 ${total}개`;
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text  = input.value.trim();
      if (!text) return;
      todos.unshift({ id: nextId++, text, done: false, priority: selectedPriority });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }

    function remove(id) {
      const li = document.querySelector(`[data-id="${id}"]`);
      if (!li) return;
      li.classList.add('removing');
      li.addEventListener('animationend', () => {
        todos = todos.filter(t => t.id !== id);
        save();
        render();
      }, { once: true });
    }

    function editText(id, text) {
      const t = todos.find(t => t.id === id);
      if (t) { t.text = text.trim() || t.text; save(); }
    }

    function setFilter(f) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.filter === f)
      );
      render();
    }

    function setPriority(p) {
      selectedPriority = p;
      document.querySelectorAll('.p-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.p === p)
      );
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    // ── AI helpers ──────────────────────────────────────────────────────────

    let pendingSubtasks = [];
    let pendingSuggestions = [];

    function setAiLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    function closeAllAiPanels() {
      document.querySelectorAll('.ai-panel').forEach(p => p.classList.remove('open'));
    }

    const PRIORITY_COLORS = { high: 'var(--ph)', mid: 'var(--pm)', low: 'var(--pl)' };
    const PRIORITY_LABELS = { high: '높음', mid: '중간', low: '낮음' };

    // 1) Natural language parse → auto set text + priority
    async function aiParse() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      setAiLoading('btn-parse', true);
      try {
        const res = await fetch('/api/parse', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        input.value = data.text || text;
        setPriority(data.priority || 'mid');
        input.focus();
      } catch {
        alert('AI 파싱 중 오류가 발생했습니다. 서버가 실행 중인지 확인해주세요.');
      } finally {
        setAiLoading('btn-parse', false);
      }
    }

    // 2) Task decomposition
    async function aiDecompose() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) { alert('먼저 분해할 할 일을 입력해주세요.'); input.focus(); return; }

      closeAllAiPanels();
      setAiLoading('btn-decompose', true);
      try {
        const res = await fetch('/api/decompose', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        pendingSubtasks = data.subtasks || [];

        const ul = document.getElementById('subtask-list');
        ul.innerHTML = pendingSubtasks.map((s, i) => `
          <li class="subtask-item">
            <span class="subtask-dot" style="background:${PRIORITY_COLORS[s.priority]}"></span>
            <span class="ai-suggestion-text">${s.text}</span>
            <span class="ai-suggestion-reason">${PRIORITY_LABELS[s.priority]}</span>
            <button class="apply-btn" onclick="applySubtask(${i})">추가</button>
          </li>
        `).join('');
        document.getElementById('ai-panel-decompose').classList.add('open');
      } catch {
        alert('AI 작업 분해 중 오류가 발생했습니다.');
      } finally {
        setAiLoading('btn-decompose', false);
      }
    }

    function applySubtask(i) {
      const s = pendingSubtasks[i];
      if (!s) return;
      todos.unshift({ id: nextId++, text: s.text, done: false, priority: s.priority });
      save(); render();
      const items = document.querySelectorAll('#subtask-list .subtask-item');
      if (items[i]) {
        items[i].querySelector('.apply-btn').textContent = '추가됨';
        items[i].querySelector('.apply-btn').disabled = true;
      }
    }

    function applyAllSubtasks() {
      pendingSubtasks.forEach((s, i) => applySubtask(i));
      closeAllAiPanels();
    }

    // 3) Smart priority suggestions
    async function aiSuggest() {
      const activeTodos = todos.filter(t => !t.done);
      if (activeTodos.length < 2) { alert('우선순위 제안을 받으려면 미완료 할 일이 2개 이상 필요합니다.'); return; }

      closeAllAiPanels();
      setAiLoading('btn-suggest', true);
      try {
        const res = await fetch('/api/suggest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ todos: activeTodos })
        });
        const data = await res.json();
        pendingSuggestions = data.suggestions || [];

        const container = document.getElementById('suggest-list');
        const changedSuggestions = pendingSuggestions.filter(s => {
          const t = todos.find(t => t.id === s.id);
          return t && t.priority !== s.priority;
        });

        if (!changedSuggestions.length) {
          container.innerHTML = '<div class="ai-summary">현재 우선순위 설정이 적절합니다. 변경이 필요한 항목이 없습니다.</div>';
          document.getElementById('ai-panel-suggest').querySelector('.apply-all-btn').style.display = 'none';
        } else {
          document.getElementById('ai-panel-suggest').querySelector('.apply-all-btn').style.display = '';
          container.innerHTML = changedSuggestions.map((s, i) => {
            const t = todos.find(t => t.id === s.id);
            if (!t) return '';
            return `
              <div class="ai-suggestion-item">
                <span class="subtask-dot" style="background:${PRIORITY_COLORS[s.priority]}"></span>
                <div class="ai-suggestion-text">
                  <div>${t.text}</div>
                  <div class="ai-suggestion-reason">${PRIORITY_LABELS[t.priority]} → ${PRIORITY_LABELS[s.priority]}: ${s.reason}</div>
                </div>
                <button class="apply-btn" data-id="${s.id}" onclick="applySuggestion(${s.id}, '${s.priority}', this)">적용</button>
              </div>
            `;
          }).join('');
        }

        if (data.summary) {
          container.innerHTML += `<div class="ai-summary">${data.summary}</div>`;
        }

        document.getElementById('ai-panel-suggest').classList.add('open');
      } catch {
        alert('AI 우선순위 제안 중 오류가 발생했습니다.');
      } finally {
        setAiLoading('btn-suggest', false);
      }
    }

    function applySuggestion(id, priority, btn) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      t.priority = priority;
      save(); render();
      btn.textContent = '적용됨';
      btn.disabled = true;
    }

    function applyAllSuggestions() {
      pendingSuggestions.forEach(s => {
        const t = todos.find(t => t.id === s.id);
        if (t) t.priority = s.priority;
      });
      save(); render();
      closeAllAiPanels();
    }

    render();
  </script>
</body>
</html>
