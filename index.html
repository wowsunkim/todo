<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px;
    }

    .app {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      font-size: 0.95rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #4f46e5; }

    button.add-btn {
      padding: 12px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button.add-btn:hover { background: #4338ca; }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid #e0e0e0;
      background: #fff;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }

    .filter-btn.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 10px;
      padding: 14px 16px;
      border: 1.5px solid #e8e8e8;
      transition: box-shadow 0.15s;
    }

    .todo-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1a1a1a;
      word-break: break-word;
      outline: none;
      border: none;
      background: transparent;
      cursor: text;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 40px 0;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #aaa;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0;
    }

    .clear-btn:hover { color: #ef4444; }
  </style>
</head>
<body>
  <div class="app">
    <h1>할 일 목록</h1>

    <div class="input-row">
      <input type="text" id="new-todo" placeholder="새 할 일을 입력하세요..." />
      <button class="add-btn" onclick="addTodo()">추가</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">전체</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active')">미완료</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done')">완료</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <div class="footer">
      <span id="count-label"></span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';
    let nextId = todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todo-list');
      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      list.innerHTML = '';

      if (!visible.length) {
        list.innerHTML = '<li class="empty">할 일이 없습니다.</li>';
      } else {
        visible.forEach(t => {
          const li = document.createElement('li');
          li.className = 'todo-item' + (t.done ? ' done' : '');
          li.innerHTML = `
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span class="todo-text" contenteditable="true"
              onblur="editText(${t.id}, this.textContent)"
              onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
            >${t.text}</span>
            <button class="delete-btn" onclick="remove(${t.id})" title="삭제">✕</button>
          `;
          list.appendChild(li);
        });
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('count-label').textContent =
        `미완료 ${active}개 / 전체 ${todos.length}개`;
    }

    function addTodo() {
      const input = document.getElementById('new-todo');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: nextId++, text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function editText(id, text) {
      const t = todos.find(t => t.id === id);
      if (t) { t.text = text.trim() || t.text; save(); }
    }

    function setFilter(f) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === f);
      });
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    document.getElementById('new-todo').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
